  tips:
    before_install:
      en_us: |
        **Step 1 — Initial setup (port 3001, only once)**
        After installation, open **http://[ZimaOS-IP]:3001** to complete the first-time setup wizard.
        Choose your admin username, password, and which network interfaces AdGuard Home should listen on.

        **Step 2 — Use port 8088 as your main WebUI**
        After completing the wizard, the main interface moves to **http://[ZimaOS-IP]:8088**.
        Bookmark this address — port 3001 is no longer needed after setup.

        **Step 3 — Configure DNS on your router (recommended)**
        To protect all devices on your network, set your router's DNS server to the ZimaOS IP address.
        Every device that gets its IP via DHCP will automatically use AdGuard Home for DNS.

        **Step 4 — Or configure DNS per device**
        If you prefer per-device control, manually set DNS to the ZimaOS IP on each device.

        **⚠️ Port 53 conflict:** If ZimaOS itself uses port 53 for system DNS, the container may fail to start.
        In that case, change the published port for DNS from `53` to a free port (e.g. `5335`) in the app settings,
        and configure your router/devices to use that port — or check if `systemd-resolved` is occupying port 53
        and disable it: `sudo systemctl stop systemd-resolved && sudo systemctl disable systemd-resolved`
      de_de: |
        **Schritt 1 — Ersteinrichtung (Port 3001, nur einmal)**
        Nach der Installation öffne **http://[ZimaOS-IP]:3001** und schließe den Einrichtungsassistenten ab.
        Lege Benutzername, Passwort und die Netzwerkschnittstellen fest.

        **Schritt 2 — Port 8088 als Haupt-WebUI nutzen**
        Nach dem Assistenten wechselt die Oberfläche zu **http://[ZimaOS-IP]:8088**.
        Port 3001 wird nach der Einrichtung nicht mehr benötigt.

        **Schritt 3 — DNS am Router einstellen (empfohlen)**
        Setze den DNS-Server deines Routers auf die ZimaOS-IP-Adresse.
        Alle Geräte im Netzwerk, die ihre IP per DHCP beziehen, nutzen dann automatisch AdGuard Home.

        **Schritt 4 — Oder DNS pro Gerät einstellen**
        Alternativ kannst du DNS auf jedem Gerät manuell auf die ZimaOS-IP setzen.

        **⚠️ Port-53-Konflikt:** Falls ZimaOS selbst Port 53 belegt, startet der Container möglicherweise nicht.
        In diesem Fall den DNS-Port in den App-Einstellungen von `53` auf einen freien Port (z.B. `5335`) ändern
        und Router/Geräte entsprechend konfigurieren. Alternativ `systemd-resolved` deaktivieren:
        `sudo systemctl stop systemd-resolved && sudo systemctl disable systemd-resolved`

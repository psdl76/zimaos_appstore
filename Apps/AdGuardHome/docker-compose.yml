name: adguard-home
services:
  adguard-home:
    image: adguard/adguardhome:latest
    deploy:
      resources:
        reservations:
          memory: 64M
    network_mode: bridge
    ports:
      - target: 3000
        published: "3001"
        protocol: tcp
      - target: 80
        published: "8088"
        protocol: tcp
      - target: 443
        published: "8443"
        protocol: tcp
      - target: 53
        published: "53"
        protocol: tcp
      - target: 53
        published: "53"
        protocol: udp
      - target: 853
        published: "853"
        protocol: tcp
      - target: 784
        published: "784"
        protocol: udp
      - target: 8853
        published: "8853"
        protocol: udp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/work
        target: /opt/adguardhome/work
      - type: bind
        source: /DATA/AppData/$AppID/conf
        target: /opt/adguardhome/conf
    x-casaos:
      ports:
        - container: "3000"
          description:
            en_us: Initial setup WebUI — only used once during first-time configuration
            de_de: Ersteinrichtungs-WebUI — wird nur einmal bei der Erstkonfiguration verwendet
        - container: "80"
          description:
            en_us: WebUI HTTP — main interface after initial setup
            de_de: WebUI HTTP — Hauptoberfläche nach der Ersteinrichtung
        - container: "443"
          description:
            en_us: WebUI HTTPS — secure interface after initial setup
            de_de: WebUI HTTPS — sichere Oberfläche nach der Ersteinrichtung
        - container: "53"
          description:
            en_us: DNS — standard port for DNS queries from your devices and router
            de_de: DNS — Standardport für DNS-Anfragen von Geräten und Router
        - container: "853"
          description:
            en_us: DNS-over-TLS (DoT) — encrypted DNS for supported clients
            de_de: DNS-over-TLS (DoT) — verschlüsseltes DNS für unterstützte Clients
        - container: "784"
          description:
            en_us: DNS-over-QUIC (DoQ) — modern encrypted DNS protocol
            de_de: DNS-over-QUIC (DoQ) — modernes verschlüsseltes DNS-Protokoll
        - container: "8853"
          description:
            en_us: DNS-over-QUIC alternate port
            de_de: DNS-over-QUIC alternativer Port
      volumes:
        - container: /opt/adguardhome/work
          description:
            en_us: AdGuard Home working directory (query logs, statistics)
            de_de: AdGuard Home Arbeitsverzeichnis (Abfrage-Logs, Statistiken)
        - container: /opt/adguardhome/conf
          description:
            en_us: AdGuard Home configuration directory (AdGuardHome.yaml)
            de_de: AdGuard Home Konfigurationsverzeichnis (AdGuardHome.yaml)
    container_name: adguard-home
x-casaos:
  architectures:
    - "386"
    - amd64
    - arm
    - arm64
    - ppc64le
  main: adguard-home
  author: CasaOS Team
  category: psdl76
  description:
    en_us: |
      AdGuard Home is a network-wide ad and tracker blocking DNS server. Once configured, it protects all devices on your home network — no client-side software needed on each device.

      Key Features:
      - Blocks ads, trackers, and malicious domains at the DNS level for every device on your network
      - Built-in dashboard with real-time query statistics, per-client rules, and filtering logs
      - Supports modern encrypted DNS protocols: DNS-over-HTTPS (DoH), DNS-over-TLS (DoT), DNS-over-QUIC (DoQ), and DNSCrypt
      - Per-client configuration — apply different filtering rules to different devices
      - Parental controls with safe search enforcement and adult content blocking
      - Custom DNS rewrite rules for local hostnames
      - Upstream DNS server selection (e.g. Cloudflare, Quad9, NextDNS)
    de_de: |
      AdGuard Home ist ein netzwerkweiter Werbeblocker und Tracker-Blocker auf DNS-Ebene. Nach der Einrichtung schützt er alle Geräte im Heimnetzwerk — ohne clientseitige Software auf jedem Gerät.

      Hauptfunktionen:
      - Blockiert Werbung, Tracker und schädliche Domains für alle Netzwerkgeräte
      - Integriertes Dashboard mit Echtzeitstatistiken, gerätespezifischen Regeln und Filterprotokollen
      - Unterstützt DNS-over-HTTPS (DoH), DNS-over-TLS (DoT), DNS-over-QUIC (DoQ) und DNSCrypt
      - Gerätespezifische Konfiguration — unterschiedliche Filterregeln pro Gerät
      - Kindersicherung mit Safe-Search-Erzwingung und Erwachseneninhalt-Sperrung
      - Benutzerdefinierte DNS-Rewrite-Regeln für lokale Hostnamen
    fr_fr: AdGuard Home est un serveur DNS de blocage des publicités et traceurs à l'échelle du réseau. Une fois configuré, il protège tous les appareils de votre réseau domestique sans logiciel supplémentaire.
    es_es: AdGuard Home es un servidor DNS bloqueador de anuncios y rastreadores para toda la red. Una vez configurado, protege todos los dispositivos de tu red doméstica sin software adicional.
    zh_cn: AdGuard Home 是一款网络级广告和跟踪器拦截 DNS 服务器。配置后，无需在每台设备上安装额外软件即可保护家庭网络中的所有设备。
    ru_ru: AdGuard Home — DNS-сервер для блокировки рекламы и трекеров на уровне всей сети. После настройки защищает все устройства домашней сети без дополнительного ПО на каждом устройстве.
    uk_ua: AdGuard Home — DNS-сервер для блокування реклами та трекерів на рівні всієї мережі без додаткового програмного забезпечення на кожному пристрої.
    pl_pl: AdGuard Home to serwer DNS blokujący reklamy i trackery w całej sieci. Po skonfigurowaniu chroni wszystkie urządzenia w sieci domowej bez dodatkowego oprogramowania.
    pt_br: O AdGuard Home é um servidor DNS bloqueador de anúncios e rastreadores para toda a rede doméstica, sem necessidade de software em cada dispositivo.
    it_it: AdGuard Home è un server DNS per il blocco di pubblicità e tracker a livello di rete. Protegge tutti i dispositivi della rete domestica senza software aggiuntivo su ogni dispositivo.

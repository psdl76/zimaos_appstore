name: unbound
services:
  unbound:
    image: klutchell/unbound:latest
    deploy:
      resources:
        reservations:
          memory: 32M
    network_mode: bridge
    ports:
      - target: 53
        published: "5335"
        protocol: udp
      - target: 53
        published: "5335"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - /DATA/AppData/$AppID/config:/etc/unbound/custom.conf.d
    x-casaos:
      ports:
        - container: "53"
          description:
            en_us: DNS port — mapped to host port 5335 to avoid conflicts with system DNS and AdGuard Home
            de_de: DNS-Port — auf Host-Port 5335 gemappt, um Konflikte mit System-DNS und AdGuard Home zu vermeiden
      volumes:
        - container: /etc/unbound/custom.conf.d
          description:
            en_us: Custom Unbound configuration directory — place additional .conf files here to override defaults
            de_de: Benutzerdefiniertes Konfigurationsverzeichnis — zusätzliche .conf-Dateien hier ablegen
    container_name: unbound
x-casaos:
  architectures:
    - amd64
    - arm64
    - arm
  main: unbound
  author: CasaOS Team
  category: psdl76
  description:
    en_us: |
      Unbound is a validating, recursive, and caching DNS resolver. Instead of forwarding your DNS queries to a third-party provider like Cloudflare or Google, Unbound resolves them itself by querying the authoritative root DNS servers directly — keeping your DNS lookups private and independent.

      This setup is designed to work as the upstream DNS resolver for AdGuard Home, combining ad and tracker blocking with full DNS privacy:

      Devices → AdGuard Home (filtering, port 53) → Unbound (recursive resolver, port 5335) → Root servers

      Key Features:
      - Recursive resolution — no dependency on upstream providers (Cloudflare, Google, etc.)
      - DNSSEC validation — cryptographically verifies DNS responses against tampering
      - DNS cache — faster repeated lookups, reduced latency
      - Prefetching — refreshes popular entries before they expire
      - Minimal footprint — typically uses less than 32MB of RAM
      - No web interface — configured via config files, runs silently in the background
    de_de: |
      Unbound ist ein validierender, rekursiver und cachender DNS-Resolver. Anstatt DNS-Anfragen an Drittanbieter wie Cloudflare oder Google weiterzuleiten, löst Unbound sie selbst auf, indem es die autoritativen Root-DNS-Server direkt befragt.

      Dieses Setup ist als Upstream-DNS-Resolver für AdGuard Home konzipiert:

      Geräte → AdGuard Home (Filterung, Port 53) → Unbound (Resolver, Port 5335) → Root-Server

      Hauptfunktionen:
      - Rekursive Auflösung — keine Abhängigkeit von externen Anbietern
      - DNSSEC-Validierung — kryptografische Verifikation von DNS-Antworten
      - DNS-Cache — schnellere Wiederholungsabfragen, geringere Latenz
      - Prefetching — aktualisiert beliebte Einträge vor dem Ablauf
      - Minimaler Speicherbedarf — typischerweise unter 32 MB RAM
  developer: NLnet Labs
  icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/unbound.png
  screenshot_link:

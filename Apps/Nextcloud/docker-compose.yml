name: nextcloud
services:
  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud
    environment:
      - MYSQL_PASSWORD=nextcloud
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_HOST=mariadb
      - REDIS_HOST=redis
    volumes:
      - /DATA/AppData/$AppID/html:/var/www/html
    ports:
      - target: 80
        published: "10080"
        protocol: tcp
    restart: unless-stopped
    depends_on:
      - mariadb
      - redis
    devices:
      - /dev/dri:/dev/dri
    x-casaos:
      envs:
        - container: MYSQL_PASSWORD
          description:
            en_us: Database password
            de_de: Datenbankpasswort
      ports:
        - container: "80"
          description:
            en_us: Web UI HTTP Port
            de_de: Web-Oberfläche HTTP-Port
      volumes:
        - container: /var/www/html
          description:
            en_us: Nextcloud application and data files
            de_de: Nextcloud Anwendungs- und Datendateien

  mariadb:
    image: mariadb:10.11
    container_name: nextcloud-mariadb
    environment:
      - MYSQL_ROOT_PASSWORD=nextcloud_root_password
      - MYSQL_PASSWORD=nextcloud
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
    volumes:
      - /DATA/AppData/$AppID/db:/var/lib/mysql
    restart: unless-stopped
    x-casaos:
      envs:
        - container: MYSQL_ROOT_PASSWORD
          description:
            en_us: MariaDB root password
            de_de: MariaDB Root-Passwort
        - container: MYSQL_PASSWORD
          description:
            en_us: MariaDB nextcloud user password
            de_de: MariaDB Nextcloud-Passwort
      volumes:
        - container: /var/lib/mysql
          description:
            en_us: MariaDB database files
            de_de: MariaDB Datenbank-Dateien

  redis:
    image: redis:alpine
    container_name: nextcloud-redis
    restart: unless-stopped
    volumes:
      - /DATA/AppData/$AppID/redis:/data
    x-casaos:
      volumes:
        - container: /data
          description:
            en_us: Redis data cache
            de_de: Redis Daten-Cache

x-casaos:
  architectures:
    - amd64
    - arm64
  main: nextcloud
  store_app_id: nextcloud
  author: CasaOS Team
  category: psdl76
  description:
    en_us: |
      Nextcloud is a suite of client-server software for creating and using file hosting services.
      This version uses the **Official Nextcloud Image** with separate MariaDB and Redis containers.
      
      It is fully compatible with Cloudflare Tunnels and reverse proxies!
    de_de: |
      Nextcloud ist eine Suite von Client-Server-Software zur Erstellung und Nutzung von File-Hosting-Diensten.
      Diese Version nutzt das **Offizielle Nextcloud-Image** mit separaten MariaDB- und Redis-Containern.

      Sie ist vollständig kompatibel mit Cloudflare Tunnels und Reverse Proxies!
  developer: Nextcloud GmbH
  icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/nextcloud.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Nextcloud/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Nextcloud/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Nextcloud/screenshot-3.png
  tagline:
    en_us: The Official, self-hosted Nextcloud deployment
    de_de: Die Offizielle, selbst gehostete Nextcloud-Bereitstellung
  thumbnail: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/nextcloud.png
  tips:
    before_install:
      en_us: |
        **Setup Guide:**
        1. Access the web interface on `http://[ZimaOS-IP]:10080`.
        2. Create an admin account.
        3. The database connection is already pre-configured via environment variables. Setup should complete automatically.
        
        **Cloudflare Tunnel Users:**
        Point your tunnel to `http://[ZimaOS-IP]:10080` (HTTP, not HTTPS).
        To fix login redirection loops with Cloudflare, edit `/DATA/AppData/nextcloud/html/config/config.php` and add:
        `'overwriteprotocol' => 'https',`
      de_de: |
        **Einrichtungsanleitung:**
        1. Öffne die Weboberfläche unter `http://[ZimaOS-IP]:10080`.
        2. Erstelle einen Admin-Account.
        3. Die Datenbankverbindung ist bereits über Umgebungsvariablen vorkonfiguriert und wird automatisch übernommen.
        
        **Cloudflare Tunnel Nutzer:**
        Leite den Tunnel auf `http://[ZimaOS-IP]:10080` weiter (HTTP, nicht HTTPS).
        Um Login-Probleme mit Cloudflare zu vermeiden, bearbeite die Datei `/DATA/AppData/nextcloud/html/config/config.php` und füge folgende Zeile hinzu:
        `'overwriteprotocol' => 'https',`
  title:
    en_us: Nextcloud
  index: /
  port_map: "10080"

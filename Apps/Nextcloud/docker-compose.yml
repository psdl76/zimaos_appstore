name: nextcloud
services:
  nextcloud:
    image: lscr.io/linuxserver/nextcloud:latest
    container_name: nextcloud
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
    volumes:
      - /DATA/AppData/$AppID/config:/config
      - /DATA/AppData/$AppID/data:/data
    ports:
      - target: 443
        published: "10443"
        protocol: tcp
    restart: unless-stopped
    depends_on:
      - mariadb
      - redis
    devices:
      - /dev/dri:/dev/dri
    x-casaos:
      envs:
        - container: TZ
          description:
            en_us: Timezone
            de_de: Zeitzone
      ports:
        - container: "443"
          description:
            en_us: Web UI HTTPS Port
            de_de: Web-Oberfläche HTTPS-Port
      volumes:
        - container: /config
          description:
            en_us: Nextcloud configuration and application files
            de_de: Nextcloud Konfigurations- und Anwendungsdateien
        - container: /data
          description:
            en_us: Nextcloud user data (your files)
            de_de: Nextcloud Benutzerdaten (deine Dateien)

  mariadb:
    image: mariadb:10.11
    container_name: nextcloud-mariadb
    environment:
      - MYSQL_ROOT_PASSWORD=nextcloud_root_password
      - MYSQL_PASSWORD=nextcloud
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
    volumes:
      - /DATA/AppData/$AppID/db:/var/lib/mysql
    restart: unless-stopped
    x-casaos:
      envs:
        - container: MYSQL_ROOT_PASSWORD
          description:
            en_us: MariaDB root password
            de_de: MariaDB Root-Passwort
        - container: MYSQL_PASSWORD
          description:
            en_us: MariaDB nextcloud user password
            de_de: MariaDB Nextcloud-Passwort
      volumes:
        - container: /var/lib/mysql
          description:
            en_us: MariaDB database files
            de_de: MariaDB Datenbank-Dateien

  redis:
    image: redis:alpine
    container_name: nextcloud-redis
    restart: unless-stopped
    volumes:
      - /DATA/AppData/$AppID/redis:/data
    x-casaos:
      volumes:
        - container: /data
          description:
            en_us: Redis data cache
            de_de: Redis Daten-Cache

x-casaos:
  architectures:
    - amd64
    - arm64
  main: nextcloud
  store_app_id: nextcloud
  author: CasaOS Team
  category: psdl76
  description:
    en_us: |
      Nextcloud is a suite of client-server software for creating and using file hosting services.
      This version uses the robust LinuxServer image with separate MariaDB and Redis containers.
      
      It is fully compatible with Cloudflare Tunnels and reverse proxies!
    de_de: |
      Nextcloud ist eine Suite von Client-Server-Software zur Erstellung und Nutzung von File-Hosting-Diensten.
      Diese Version nutzt das robuste LinuxServer-Image mit separaten MariaDB- und Redis-Containern.

      Sie ist vollständig kompatibel mit Cloudflare Tunnels und Reverse Proxies!
  developer: LinuxServer.io
  icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/nextcloud.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Nextcloud/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Nextcloud/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Nextcloud/screenshot-3.png
  tagline:
    en_us: Self-hosted file sync and share (LinuxServer version)
    de_de: Selbst-gehostete Dateisynchronisierung (LinuxServer Version)
  thumbnail: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/nextcloud.png
  tips:
    before_install:
      en_us: |
        **Setup Guide:**
        1. Access the web interface on `https://[ZimaOS-IP]:10443` (accept the self-signed certificate).
        2. Create an admin account.
        3. For database, select "MySQL/MariaDB" and use:
           - User: `nextcloud`
           - Password: `nextcloud` (or whatever you set above)
           - Database: `nextcloud`
           - Host: `mariadb`
        
        **Cloudflare Tunnel Users:**
        This standard version works flawlessly behind Cloudflare. Just point your tunnel to `https://[ZimaOS-IP]:10443` (make sure to enable "No TLS Verify" in your tunnel settings).
        Then edit your Nextcloud `config.php` and set `'overwriteprotocol' => 'https',`.
      de_de: |
        **Einrichtungsanleitung:**
        1. Öffne die Weboberfläche unter `https://[ZimaOS-IP]:10443` (akzeptiere das Zertifikat).
        2. Erstelle einen Admin-Account.
        3. Wähle bei Datenbank "MySQL/MariaDB" und nutze:
           - User: `nextcloud`
           - Passwort: `nextcloud` (oder was du oben eingegeben hast)
           - Datenbank: `nextcloud`
           - Host: `mariadb`
        
        **Cloudflare Tunnel Nutzer:**
        Diese Standard-Version funktioniert perfekt mit Cloudflare. Leite den Tunnel einfach auf `https://[ZimaOS-IP]:10443` weiter (aktiviere "No TLS Verify" in den Cloudflare Tunnel Einstellungen).
        Bearbeite danach die `config.php` von Nextcloud und füge `'overwriteprotocol' => 'https',` hinzu.
  title:
    en_us: Nextcloud
  index: /
  port_map: "10443"

name: mosquitto
services:
  mosquitto-init:
    image: eclipse-mosquitto:latest
    restart: "no"
    volumes:
      - /DATA/AppData/$AppID/config:/mosquitto/config
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ -f /mosquitto/config/mosquitto.conf ]; then
          echo "Config already exists, skipping init."
          exit 0
        fi
        cat > /mosquitto/config/mosquitto.conf << 'EOF'
        # MQTT listener (standard port)
        listener 1883
        allow_anonymous true

        # MQTT over WebSockets (for web clients and some HA integrations)
        listener 9001
        protocol websockets
        allow_anonymous true

        # Persistence — survives restarts
        persistence true
        persistence_location /mosquitto/data/

        # Logging
        log_dest file /mosquitto/log/mosquitto.log
        log_type error
        log_type warning
        log_type notice
        log_type information
        EOF
        echo "Default config written."
    container_name: mosquitto-init

  mosquitto:
    image: eclipse-mosquitto:latest
    deploy:
      resources:
        reservations:
          memory: 32M
    depends_on:
      mosquitto-init:
        condition: service_completed_successfully
    network_mode: bridge
    ports:
      - target: 1883
        published: "1883"
        protocol: tcp
      - target: 9001
        published: "9001"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - /DATA/AppData/$AppID/config:/mosquitto/config
      - /DATA/AppData/$AppID/data:/mosquitto/data
      - /DATA/AppData/$AppID/log:/mosquitto/log
    x-casaos:
      ports:
        - container: "1883"
          description:
            en_us: MQTT — standard broker port for Home Assistant and all MQTT clients
            de_de: MQTT — Standard-Broker-Port für Home Assistant und alle MQTT-Clients
        - container: "9001"
          description:
            en_us: MQTT over WebSockets — for web-based clients and browser integrations
            de_de: MQTT über WebSockets — für webbasierte Clients und Browser-Integrationen
      volumes:
        - container: /mosquitto/config
          description:
            en_us: Mosquitto configuration directory — edit mosquitto.conf to customize
            de_de: Konfigurationsverzeichnis — mosquitto.conf zum Anpassen bearbeiten
        - container: /mosquitto/data
          description:
            en_us: Persistent message store — retained messages survive restarts
            de_de: Persistenter Nachrichtenspeicher — Retained-Messages überleben Neustarts
        - container: /mosquitto/log
          description:
            en_us: Broker log files
            de_de: Broker-Protokolldateien
    container_name: mosquitto
x-casaos:
  architectures:
    - amd64
    - arm64
    - arm
    - "386"
  main: mosquitto
  author: CasaOS Team
  category: psdl76
  description:
    en_us: |
      Eclipse Mosquitto is a lightweight, open-source MQTT message broker. MQTT is the standard protocol for IoT and smart home devices — it connects sensors, actuators, and automation systems through a publish/subscribe messaging pattern.

      Mosquitto is the most commonly used MQTT broker for Home Assistant. Once running, it enables all MQTT-based integrations: Zigbee2MQTT, Tasmota, ESPHome, Shelly devices, and many more.

      Key Features:
      - Lightweight — typically uses less than 20 MB of RAM
      - MQTT 3.1, 3.1.1, and 5.0 support
      - WebSocket support for browser-based clients
      - TLS/SSL support for encrypted connections
      - Username/password authentication and ACL (access control lists)
      - Persistent message store — retained messages survive restarts
      - Bridges — connect multiple brokers together
    de_de: |
      Eclipse Mosquitto ist ein leichtgewichtiger Open-Source-MQTT-Nachrichtenbroker. MQTT ist das Standardprotokoll für IoT- und Smart-Home-Geräte — es verbindet Sensoren, Aktoren und Automatisierungssysteme über ein Publish/Subscribe-Muster.

      Mosquitto ist der am häufigsten verwendete MQTT-Broker für Home Assistant. Nach dem Start ermöglicht er alle MQTT-basierten Integrationen: Zigbee2MQTT, Tasmota, ESPHome, Shelly-Geräte und viele mehr.

      Hauptfunktionen:
      - Leichtgewichtig — typischerweise unter 20 MB RAM
      - MQTT 3.1, 3.1.1 und 5.0 Unterstützung
      - WebSocket-Unterstützung für browserbasierte Clients
      - TLS/SSL für verschlüsselte Verbindungen
      - Benutzername/Passwort-Authentifizierung und ACLs
      - Persistenter Nachrichtenspeicher
      - Bridges — mehrere Broker verbinden

  thumbnail: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/mosquitto.png
  tips:
    before_install:
      en_us: |
        ## What Mosquitto does

        Mosquitto is an MQTT broker — a central hub that receives messages from IoT devices and forwards them to subscribers. Home Assistant connects to it as a client to receive sensor data and send commands.

        **Typical flow:**
        ```
        Zigbee2MQTT / ESPHome / Tasmota → Mosquitto (port 1883) → Home Assistant
        ```

        ---

        ## Step 1 — Install Mosquitto

        Install the app. The first start automatically creates a working default config at:
        `/DATA/AppData/mosquitto/config/mosquitto.conf`

        Default settings:
        - Port 1883 — anonymous access allowed
        - Port 9001 — MQTT over WebSockets
        - Persistence enabled

        ---

        ## Step 2 — Connect Home Assistant

        In Home Assistant, go to **Settings → Devices & Services → Add Integration** and search for **MQTT**.

        Enter:
        - **Broker:** `[ZimaOS-IP]`
        - **Port:** `1883`
        - **Username / Password:** leave empty (anonymous mode)

        Click **Submit** — Home Assistant will connect immediately.

        ---

        ## Step 3 — Add authentication (recommended)

        The default config allows anonymous access. For a more secure setup, add a password:

        1. SSH into ZimaOS and run:
           ```bash
           docker exec -it mosquitto mosquitto_passwd -c /mosquitto/config/passwd myusername
           ```
           Enter a password when prompted.

        2. Edit `/DATA/AppData/mosquitto/config/mosquitto.conf` and replace `allow_anonymous true` with:
           ```
           allow_anonymous false
           password_file /mosquitto/config/passwd
           ```

        3. Restart the container, then update the credentials in Home Assistant's MQTT integration.

        ---

        ## Useful MQTT test commands

        Test from any machine with `mosquitto_pub` / `mosquitto_sub` installed, or use MQTT Explorer (a free GUI client):

        ```bash
        # Subscribe to all topics
        mosquitto_sub -h [ZimaOS-IP] -t '#' -v

        # Publish a test message
        mosquitto_pub -h [ZimaOS-IP] -t 'test/hello' -m 'world'
        ```

      de_de: |
        ## Was Mosquitto macht

        Mosquitto ist ein MQTT-Broker — ein zentraler Hub, der Nachrichten von IoT-Geräten empfängt und an Subscriber weiterleitet. Home Assistant verbindet sich als Client, um Sensordaten zu empfangen und Befehle zu senden.

        **Typischer Datenfluss:**
        ```
        Zigbee2MQTT / ESPHome / Tasmota → Mosquitto (Port 1883) → Home Assistant
        ```

        ---

        ## Schritt 1 — Mosquitto installieren

        App installieren. Beim ersten Start wird automatisch eine funktionsfähige Standard-Konfiguration erstellt:
        `/DATA/AppData/mosquitto/config/mosquitto.conf`

        Standardeinstellungen:
        - Port 1883 — anonymer Zugriff erlaubt
        - Port 9001 — MQTT über WebSockets
        - Persistenz aktiviert

        ---

        ## Schritt 2 — Home Assistant verbinden

        In Home Assistant unter **Einstellungen → Geräte & Dienste → Integration hinzufügen** nach **MQTT** suchen.

        Eingeben:
        - **Broker:** `[ZimaOS-IP]`
        - **Port:** `1883`
        - **Benutzername / Passwort:** leer lassen (anonymer Modus)

        **Absenden** klicken — Home Assistant verbindet sich sofort.

        ---

        ## Schritt 3 — Authentifizierung einrichten (empfohlen)

        Die Standard-Konfiguration erlaubt anonymen Zugriff. Für mehr Sicherheit ein Passwort hinzufügen:

        1. Per SSH in ZimaOS einloggen und ausführen:
           ```bash
           docker exec -it mosquitto mosquitto_passwd -c /mosquitto/config/passwd meinbenutzername
           ```
           Passwort eingeben wenn aufgefordert.

        2. `/DATA/AppData/mosquitto/config/mosquitto.conf` bearbeiten und `allow_anonymous true` ersetzen durch:
           ```
           allow_anonymous false
           password_file /mosquitto/config/passwd
           ```

        3. Container neu starten, dann Zugangsdaten in der MQTT-Integration von Home Assistant aktualisieren.

        ---

        ## Nützliche MQTT-Testbefehle

        Mit `mosquitto_pub` / `mosquitto_sub` oder dem kostenlosen GUI-Client MQTT Explorer testen:

        ```bash
        # Alle Topics abonnieren
        mosquitto_sub -h [ZimaOS-IP] -t '#' -v

        # Testnachricht senden
        mosquitto_pub -h [ZimaOS-IP] -t 'test/hallo' -m 'welt'
        ```
  title:
    en_us: Mosquitto MQTT Broker
  index: /
  port_map: "1883"

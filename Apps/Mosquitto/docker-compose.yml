    de_de: Leichtgewichtiger MQTT-Broker — das Rückgrat deines Smart Home
    fr_fr: Broker MQTT léger — l'épine dorsale de votre maison intelligente
    zh_cn: 轻量级 MQTT 消息代理 — 智能家居的核心

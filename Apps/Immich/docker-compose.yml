tagline:
    en_us: Self-hosted Google Photos alternative — AI search, face recognition, auto backup
    de_de: Selbst gehostete Google Photos-Alternative — KI-Suche, Gesichtserkennung, Auto-Backup
    fr_fr: Alternative Google Photos auto-hébergée — recherche IA, reconnaissance faciale
    zh_cn: 自托管 Google Photos 替代方案 — AI 搜索、面部识别、自动备份
  thumbnail: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/immich.png
  tips:
    before_install:
      en_us: |
        ## Hardware acceleration (ZimaBoard 2 — Intel N150)

        This compose is pre-configured with two Intel hardware acceleration features:

        **Quick Sync** (`immich-server`) — hardware video transcoding via `/dev/dri`
        Immich converts uploaded videos to web-compatible formats. On the Intel N150, Quick Sync does this 5–10× faster than CPU-only while using significantly less power.

        **OpenVINO** (`immich-machine-learning`) — GPU-accelerated ML inference via Intel iGPU
        Immich runs CLIP (smart search) and facial recognition models on every uploaded photo. OpenVINO accelerates this on the Intel N150's integrated GPU, dramatically reducing the time to index a large photo library.

        To activate Quick Sync after installation, go to:
        **Administration → Video Transcoding Settings → Hardware Acceleration → Quick Sync**

        To activate OpenVINO after installation, go to:
        **Administration → Machine Learning Settings → URL** (already connected) → the openvino image handles the rest automatically.

        > If you are **not** using a ZimaBoard 2 or Intel CPU, change the `immich-machine-learning` image tag from `release-openvino` back to `release` and remove the `devices` and `device_cgroup_rules` entries from that service.

        ---

        ## Step 1 — Set your database password

        Before installing, change `DB_PASSWORD` from the default `immich_db_password` to something secure (letters and numbers only, no special characters).

        **Important:** The password appears in three places in the compose file — `immich-server`, `immich-machine-learning`, and `database`. All three must match.

        ---

        ## Step 2 — First start

        Installation takes 2–5 minutes — Immich downloads ML models (~2 GB) on first start.

        Open **http://[ZimaOS-IP]:2283** and create your admin account.

        ---

        ## Step 3 — Install the mobile app

        Download the **Immich** app for [iOS](https://apps.apple.com/app/immich/id1613945652) or [Android](https://play.google.com/store/apps/details?id=app.alextran.immich).

        In the app settings:
        - **Server URL:** `http://[ZimaOS-IP]:2283`
        - Log in with your admin account
        - Enable automatic backup in the app settings

        ---

        ## Step 4 — Storage location

        Your photos and videos are stored at:
        ```
        /DATA/AppData/immich/library
        ```

        The PostgreSQL database is at:
        ```
        /DATA/AppData/immich/postgres
        ```

        **Back up both directories** to protect your library. The database contains all metadata, albums, faces, and search index — without it, the photo files alone are not useful.

        ---

        ## HDD vs SSD

        If your ZimaBoard 2's data volume is on a **spinning hard drive** (not SSD), edit the compose and uncomment this line in the `database` service:

        ```yaml
        # DB_STORAGE_TYPE: 'HDD'
        ```

        This tunes PostgreSQL for sequential I/O patterns, improving performance on HDDs.

        ---

        ## Upgrading Immich

        Immich releases updates frequently. To upgrade:
        ```bash
        docker compose -p immich pull
        docker compose -p immich up -d
        ```

        **Never skip major versions** — always upgrade step by step. Check the [release notes](https://github.com/immich-app/immich/releases) for breaking changes before upgrading.

      de_de: |
        ## Hardware-Beschleunigung (ZimaBoard 2 — Intel N150)

        Dieses Compose ist mit zwei Intel-Hardware-Beschleunigungsfeatures vorkonfiguriert:

        **Quick Sync** (`immich-server`) — Hardware-Video-Transcodierung via `/dev/dri`
        Immich konvertiert hochgeladene Videos in webkompatible Formate. Auf dem Intel N150 ist Quick Sync 5–10× schneller als CPU-only bei deutlich geringerem Energieverbrauch.

        **OpenVINO** (`immich-machine-learning`) — GPU-beschleunigte ML-Inferenz via Intel iGPU
        Immich führt CLIP (Smart Search) und Gesichtserkennung auf jedem hochgeladenen Foto aus. OpenVINO beschleunigt dies auf der integrierten GPU des Intel N150 erheblich.

        Quick Sync nach der Installation aktivieren:
        **Administration → Video-Transcodierungseinstellungen → Hardware-Beschleunigung → Quick Sync**

        > Wenn **kein** ZimaBoard 2 oder Intel-CPU verwendet wird, den Image-Tag von `immich-machine-learning` von `release-openvino` auf `release` zurückändern und `devices` sowie `device_cgroup_rules` entfernen.

        ---

        ## Schritt 1 — Datenbankpasswort setzen

        Vor der Installation `DB_PASSWORD` von `immich_db_password` auf etwas Sicheres ändern (nur Buchstaben und Ziffern, keine Sonderzeichen).

        **Wichtig:** Das Passwort erscheint an drei Stellen in der Compose-Datei — `immich-server`, `immich-machine-learning` und `database`. Alle drei müssen übereinstimmen.

        ---

        ## Schritt 2 — Erster Start

        Die Installation dauert 2–5 Minuten — Immich lädt beim ersten Start ML-Modelle herunter (~2 GB).

        **http://[ZimaOS-IP]:2283** öffnen und Admin-Konto erstellen.

        ---

        ## Schritt 3 — Mobile App installieren

        Die **Immich**-App für [iOS](https://apps.apple.com/app/immich/id1613945652) oder [Android](https://play.google.com/store/apps/details?id=app.alextran.immich) herunterladen.

        In den App-Einstellungen:
        - **Server-URL:** `http://[ZimaOS-IP]:2283`
        - Mit dem Admin-Konto einloggen
        - Automatisches Backup in den App-Einstellungen aktivieren

        ---

        ## Speicherorte

        Fotos und Videos:
        ```
        /DATA/AppData/immich/library
        ```
        PostgreSQL-Datenbank:
        ```
        /DATA/AppData/immich/postgres
        ```

        **Beide Verzeichnisse regelmäßig sichern.** Die Datenbank enthält alle Metadaten, Alben, Gesichter und den Suchindex.

        ---

        ## HDD vs SSD

        Wenn das Daten-Volume des ZimaBoard 2 auf einer **Festplatte** (kein SSD) liegt, in der Compose-Datei unter `database` auskommentieren:

        ```yaml
        # DB_STORAGE_TYPE: 'HDD'
        ```

        ---

        ## Immich aktualisieren

        ```bash
        docker compose -p immich pull
        docker compose -p immich up -d
        ```

        **Nie Major-Versionen überspringen** — immer schrittweise upgraden. [Release Notes](https://github.com/immich-app/immich/releases) vor dem Upgrade prüfen.

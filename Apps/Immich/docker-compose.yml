name: immich

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:release
    deploy:
      resources:
        reservations:
          memory: 1024M
    # Intel Quick Sync — hardware video transcoding (ZimaBoard 2: Intel N150 UHD Graphics)
    devices:
      - /dev/dri:/dev/dri
    network_mode: bridge
    ports:
      - target: 2283
        published: "2283"
        protocol: tcp
    restart: always
    volumes:
      - /DATA/AppData/$AppID/library:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      DB_USERNAME: immich
      DB_PASSWORD: immich_db_password
      DB_DATABASE_NAME: immich
      TZ: Europe/Berlin
    depends_on:
      - redis
      - database
    healthcheck:
      disable: false
    x-casaos:
      ports:
        - container: "2283"
          description:
            en_us: Immich web interface and API
            de_de: Immich Web-Oberfläche und API
      volumes:
        - container: /data
          description:
            en_us: Photo and video library — all uploaded media is stored here
            de_de: Foto- und Videobibliothek — alle hochgeladenen Medien werden hier gespeichert
      envs:
        - container: DB_PASSWORD
          description:
            en_us: "Database password — change before first start, must match in all services"
            de_de: "Datenbankpasswort — vor dem ersten Start ändern, muss in allen Services übereinstimmen"
        - container: TZ
          description:
            en_us: "Timezone — e.g. Europe/Berlin, America/New_York"
            de_de: "Zeitzone — z.B. Europe/Berlin, America/New_York"

  immich-machine-learning:
    container_name: immich_machine_learning
    # OpenVINO image tag — GPU-accelerated ML inference for Intel UHD (ZimaBoard 2: Intel N150)
    image: ghcr.io/immich-app/immich-machine-learning:release-openvino
    deploy:
      resources:
        reservations:
          memory: 1024M
    # OpenVINO device access for Intel iGPU
    device_cgroup_rules:
      - 'c 189:* rmw'
    devices:
      - /dev/dri:/dev/dri
    restart: always
    volumes:
      - immich_model_cache:/cache
      - /dev/bus/usb:/dev/bus/usb
    environment:
      DB_USERNAME: immich
      DB_PASSWORD: immich_db_password
      DB_DATABASE_NAME: immich
      TZ: Europe/Berlin
    healthcheck:
      disable: false
    x-casaos:
      volumes:
        - container: /cache
          description:
            en_us: ML model cache — CLIP and face recognition models are downloaded here (~2 GB)
            de_de: ML-Modell-Cache — CLIP- und Gesichtserkennung-Modelle werden hier gespeichert (~2 GB)

  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9-alpine
    deploy:
      resources:
        reservations:
          memory: 64M
    restart: always
    healthcheck:
      test: redis-cli ping || exit 1

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    deploy:
      resources:
        reservations:
          memory: 256M
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: immich
      POSTGRES_PASSWORD: immich_db_password
      POSTGRES_DB: immich
      POSTGRES_INITDB_ARGS: '--data-checksums'
      # Uncomment if your database volume is on a spinning HDD (not SSD):
      # DB_STORAGE_TYPE: 'HDD'
    volumes:
      - /DATA/AppData/$AppID/postgres:/var/lib/postgresql/data
    healthcheck:
      disable: false
    x-casaos:
      volumes:
        - container: /var/lib/postgresql/data
          description:
            en_us: PostgreSQL database files — back this up regularly alongside your photo library
            de_de: PostgreSQL-Datenbankdateien — regelmäßig zusammen mit der Fotobibliothek sichern

volumes:
  immich_model_cache:
    name: immich_model_cache

x-casaos:
  architectures:
    - amd64
    - arm64
  main: immich-server
  store_app_id: immich
  author: CasaOS Team
  category: psdl76
  description:
    en_us: |
      Immich is a high-performance, self-hosted photo and video backup solution. It looks and feels like Google Photos — with automatic mobile backup, shared albums, facial recognition, and AI-powered smart search — but runs entirely on your own hardware with no subscription or cloud dependency.

      This configuration is optimized for the ZimaBoard 2 (Intel N150):
      - **Video transcoding** uses Intel Quick Sync via the integrated UHD Graphics — significantly faster than CPU-only and uses less power
      - **Machine learning inference** (face recognition, CLIP smart search) uses OpenVINO on the Intel iGPU — much faster initial indexing of large photo libraries

      Key Features:
      - Automatic photo and video backup from iOS and Android
      - AI-powered smart search (describe a scene in plain language)
      - Facial recognition — automatically groups photos by person
      - Shared albums with other users
      - Map view — browse photos by location
      - Memory lane — "On this day" view
      - Duplicate detection
      - RAW file support
      - 4K video support with hardware-accelerated transcoding
    de_de: |
      Immich ist eine hochperformante, selbst gehostete Foto- und Video-Backup-Lösung. Sie sieht aus und funktioniert wie Google Photos — mit automatischem mobilen Backup, geteilten Alben, Gesichtserkennung und KI-gestützter Suche — läuft aber vollständig auf eigener Hardware ohne Abo oder Cloud-Abhängigkeit.

      Diese Konfiguration ist für das ZimaBoard 2 (Intel N150) optimiert:
      - **Video-Transcodierung** nutzt Intel Quick Sync über die integrierte UHD-Grafik — deutlich schneller als CPU-only und energieeffizienter
      - **Machine-Learning-Inferenz** (Gesichtserkennung, CLIP Smart Search) nutzt OpenVINO auf dem Intel iGPU — viel schnellere Erstindizierung großer Fotobibliotheken

      Hauptfunktionen:
      - Automatisches Foto- und Video-Backup von iOS und Android
      - KI-gestützte Suche (Szene in natürlicher Sprache beschreiben)
      - Gesichtserkennung — Fotos automatisch nach Person gruppieren
      - Geteilte Alben mit anderen Nutzern
      - Kartenansicht — Fotos nach Standort durchsuchen
      - Erinnerungen — "An diesem Tag"-Ansicht
      - Duplikaterkennung
      - RAW-Datei-Unterstützung
      - 4K-Video mit Hardware-beschleunigter Transcodierung
    fr_fr: |
      Immich est une solution de sauvegarde de photos et vidéos auto-hébergée, ressemblant à Google Photos, avec reconnaissance faciale et recherche IA — sans abonnement ni cloud.
    zh_cn: |
      Immich 是高性能的自托管照片和视频备份方案，外观和功能类似 Google Photos，支持自动备份、面部识别和 AI 智能搜索，完全运行在本地硬件上。
  developer: Immich
  icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/immich.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Immich/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Immich/screenshot-2.png

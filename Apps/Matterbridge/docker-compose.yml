name: matterbridge
services:
  matterbridge:
    image: luligu/matterbridge:latest
    deploy:
      resources:
        reservations:
          memory: 256M
    network_mode: host
    restart: unless-stopped
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/Matterbridge
        target: /root/Matterbridge
      - type: bind
        source: /DATA/AppData/$AppID/.matterbridge
        target: /root/.matterbridge
      - type: bind
        source: /DATA/AppData/$AppID/.mattercert
        target: /root/.mattercert
    x-casaos:
      volumes:
        - container: /root/Matterbridge
          description:
            en_us: Plugin directory — installed Matterbridge plugins live here
            de_de: Plugin-Verzeichnis — installierte Matterbridge-Plugins
        - container: /root/.matterbridge
          description:
            en_us: Configuration and state — device pairings, settings, Matter fabric data
            de_de: Konfiguration und Zustand — Gerätekopplungen, Einstellungen, Matter-Fabric-Daten
        - container: /root/.mattercert
          description:
            en_us: Matter certificates — do not delete, required for paired controllers to reconnect
            de_de: Matter-Zertifikate — nicht löschen, erforderlich für die Wiederverbindung gekoppelter Controller
    container_name: matterbridge
x-casaos:
  architectures:
    - amd64
    - arm64
    - arm
  main: matterbridge
  author: CasaOS Team
  category: psdl76
  description:
    en_us: |
      Matterbridge is a Matter bridge that connects your existing smart home devices to any Matter controller — Apple Home, Google Home, Amazon Alexa, SmartThings, and Home Assistant — without replacing your current setup.

      Using plugins, Matterbridge exposes devices from platforms like Zigbee2MQTT, Home Assistant, Shelly, and many others as native Matter devices. This means your Zigbee sensors, Shelly plugs, or any HA entity can appear directly in Apple Home or Google Home without any cloud service.

      Key Features:
      - Bridges non-Matter devices to Matter — works with Apple Home, Google Home, Alexa, SmartThings, HA
      - Plugin system — extend with community plugins for Zigbee2MQTT, Shelly, Home Assistant, and more
      - Fully local — no cloud, no subscription
      - Web frontend for plugin management and Matter pairing
      - Supports multiple simultaneous Matter controllers (fabrics)
      - Automatic OTA plugin updates
    de_de: |
      Matterbridge ist eine Matter-Bridge, die bestehende Smart-Home-Geräte mit jedem Matter-Controller verbindet — Apple Home, Google Home, Amazon Alexa, SmartThings und Home Assistant — ohne das aktuelle Setup zu ersetzen.

      Über Plugins stellt Matterbridge Geräte aus Plattformen wie Zigbee2MQTT, Home Assistant, Shelly und vielen anderen als native Matter-Geräte bereit. Damit können Zigbee-Sensoren, Shelly-Steckdosen oder beliebige HA-Entitäten direkt in Apple Home oder Google Home erscheinen — ohne Cloud-Dienst.

      Hauptfunktionen:
      - Verbindet Nicht-Matter-Geräte mit Matter — Apple Home, Google Home, Alexa, SmartThings, HA
      - Plugin-System — erweiterbar mit Community-Plugins für Zigbee2MQTT, Shelly, Home Assistant und mehr
      - Vollständig lokal — kein Cloud, kein Abo
      - Web-Frontend für Plugin-Verwaltung und Matter-Kopplung
      - Unterstützt mehrere gleichzeitige Matter-Controller (Fabrics)
      - Automatische OTA-Plugin-Updates
    fr_fr: |
      Matterbridge est un pont Matter qui connecte vos appareils domotiques existants à n'importe quel contrôleur Matter — sans remplacer votre installation actuelle.
    zh_cn: |
      Matterbridge 是一个 Matter 网桥，可将现有智能家居设备连接到任何 Matter 控制器——Apple Home、Google Home、Amazon Alexa 等，无需替换现有设置。

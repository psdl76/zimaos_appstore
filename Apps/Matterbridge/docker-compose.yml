  tips:
    before_install:
      en_us: |
        ## Why host network mode?

        Matter uses mDNS for device discovery and UDP port 5540 for commissioning. Both require direct access to the host network — `network_mode: host` is mandatory. Matterbridge is accessible at **http://[ZimaOS-IP]:8283** directly.

        ---

        ## Step 1 — Install and open the frontend

        After installation, open **http://[ZimaOS-IP]:8283**

        You'll see the Matterbridge dashboard. No initial configuration is needed — everything is managed through the web UI.

        ---

        ## Step 2 — Install plugins

        Plugins connect Matterbridge to your existing smart home platforms. In the frontend, go to **Install plugin** and search for the plugin you need:

        | Plugin | What it does |
        |---|---|
        | `matterbridge-zigbee2mqtt` | Exposes Zigbee2MQTT devices as Matter devices |
        | `matterbridge-shelly` | Exposes Shelly devices as Matter devices |
        | `matterbridge-hass` | Exposes Home Assistant entities as Matter devices |
        | `matterbridge-somfy-tahoma` | Somfy TaHoma bridge |

        Browse all plugins at [npmjs.com](https://www.npmjs.com/search?q=matterbridge-)

        After installing a plugin, configure it in the **Plugin settings** tab (e.g. enter your Zigbee2MQTT MQTT broker address or Home Assistant URL + token).

        ---

        ## Step 3 — Pair with a Matter controller

        Once plugins are configured and devices are visible in the frontend:

        1. In the Matterbridge frontend, click **"Add to Apple Home"** (or Google Home, Alexa, etc.)
        2. A QR code and pairing code appear
        3. Open your controller app:
           - **Apple Home:** tap + → Add Accessory → scan the QR code
           - **Google Home:** tap + → Set up device → Matter → scan the QR code
           - **Amazon Alexa:** tap + → Add Device → Matter → scan the QR code
           - **Home Assistant:** Settings → Devices → Add Integration → Matter (Server) → scan

        Your Zigbee, Shelly, or HA devices will appear as native Matter accessories.

        ---

        ## Important: Matter certificates

        The `/root/.mattercert` volume contains your Matter fabric credentials. **Do not delete this directory** — if lost, all paired controllers must re-pair from scratch.

        Paired controller data is stored in `/root/.matterbridge`. Back up both directories regularly.

        ---

        ## Matterbridge + Zigbee2MQTT on ZimaOS

        If you run both Zigbee2MQTT and Matterbridge on ZimaOS, configure the `matterbridge-zigbee2mqtt` plugin to connect to your Mosquitto broker:

        ```
        MQTT broker: mqtt://[ZimaOS-IP]:1883
        ```

        Your Zigbee devices then appear natively in Apple Home / Google Home — no HA required as intermediary.

      de_de: |
        ## Warum Host-Netzwerkmodus?

        Matter nutzt mDNS für die Geräteerkennung und UDP-Port 5540 für die Kopplung. Beides erfordert direkten Zugriff auf das Host-Netzwerk — `network_mode: host` ist zwingend erforderlich. Matterbridge ist direkt unter **http://[ZimaOS-IP]:8283** erreichbar.

        ---

        ## Schritt 1 — Installieren und Frontend öffnen

        Nach der Installation öffnen: **http://[ZimaOS-IP]:8283**

        Das Matterbridge-Dashboard wird angezeigt. Keine initiale Konfiguration nötig — alles wird über die Web-UI verwaltet.

        ---

        ## Schritt 2 — Plugins installieren

        Plugins verbinden Matterbridge mit bestehenden Smart-Home-Plattformen. Im Frontend unter **Plugin installieren** nach dem benötigten Plugin suchen:

        | Plugin | Funktion |
        |---|---|
        | `matterbridge-zigbee2mqtt` | Stellt Zigbee2MQTT-Geräte als Matter-Geräte bereit |
        | `matterbridge-shelly` | Stellt Shelly-Geräte als Matter-Geräte bereit |
        | `matterbridge-hass` | Stellt Home Assistant-Entitäten als Matter-Geräte bereit |

        Alle Plugins auf [npmjs.com](https://www.npmjs.com/search?q=matterbridge-) durchsuchen.

        Nach der Plugin-Installation unter **Plugin-Einstellungen** konfigurieren (z.B. Zigbee2MQTT MQTT-Broker-Adresse oder Home Assistant URL + Token eingeben).

        ---

        ## Schritt 3 — Mit Matter-Controller koppeln

        Sobald Plugins konfiguriert sind und Geräte im Frontend sichtbar sind:

        1. Im Matterbridge-Frontend auf **"Zu Apple Home hinzufügen"** klicken (oder Google Home, Alexa usw.)
        2. QR-Code und Kopplungscode werden angezeigt
        3. Controller-App öffnen:
           - **Apple Home:** + → Zubehör hinzufügen → QR-Code scannen
           - **Google Home:** + → Gerät einrichten → Matter → QR-Code scannen
           - **Amazon Alexa:** + → Gerät hinzufügen → Matter → QR-Code scannen
           - **Home Assistant:** Einstellungen → Geräte → Integration hinzufügen → Matter (Server) → scannen

        Zigbee-, Shelly- oder HA-Geräte erscheinen als native Matter-Zubehör.

        ---

        ## Wichtig: Matter-Zertifikate

        Das Verzeichnis `/root/.mattercert` enthält die Matter-Fabric-Zugangsdaten. **Dieses Verzeichnis nicht löschen** — bei Verlust müssen alle gekoppelten Controller neu koppeln.

        Beide Verzeichnisse (`/root/.mattercert` und `/root/.matterbridge`) regelmäßig sichern.

        ---

        ## Matterbridge + Zigbee2MQTT auf ZimaOS

        Wenn Zigbee2MQTT und Matterbridge beide auf ZimaOS laufen, das `matterbridge-zigbee2mqtt`-Plugin auf den Mosquitto-Broker konfigurieren:

        ```
        MQTT-Broker: mqtt://[ZimaOS-IP]:1883
        ```

        Zigbee-Geräte erscheinen dann nativ in Apple Home / Google Home — ohne HA als Zwischensystem.

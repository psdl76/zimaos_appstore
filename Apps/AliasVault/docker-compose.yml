    - https://cdn.jsdelivr.net/gh/psdl76/zimaos_appstore@main/Apps/AliasVault/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/psdl76/zimaos_appstore@main/Apps/AliasVault/screenshot-3.png
  tagline:
    en_us: Privacy-first password & email alias manager
    de_de: Datenschutzorientierter Passwort- & E-Mail-Alias-Manager
    fr_fr: Gestionnaire de mots de passe et d'alias e-mail axé sur la confidentialité
    es_es: Gestor de contraseñas y alias de correo centrado en la privacidad
    ru_ru: Менеджер паролей и псевдонимов с акцентом на конфиденциальность
    zh_cn: 注重隐私的密码和电子邮件别名管理器
  thumbnail: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/aliasvault.png
  tips:
    before_install:
      en_us: |
        **First-time setup:**
        1. Open the web UI at http://[ZimaOS-IP]:1080 after installation
        2. Register your account — the first account becomes the administrator
        3. After setup, set PUBLIC_REGISTRATION_ENABLED to 'false' to prevent others from registering

        **Email aliasing (optional):**
        To use your own domain for email aliases, point your domain's MX record to your ZimaOS IP and set PRIVATE_EMAIL_DOMAINS to your domain name.

        **Ports 25 & 587** are only needed for the email aliasing feature. If you don't need it, these ports can remain unused.
      de_de: |
        **Ersteinrichtung:**
        1. Öffne die Web-Oberfläche unter http://[ZimaOS-IP]:1080 nach der Installation
        2. Registriere dein Konto — das erste Konto wird zum Administrator
        3. Nach der Einrichtung setze PUBLIC_REGISTRATION_ENABLED auf 'false'

        **E-Mail-Aliasing (optional):**
        Um deine eigene Domain für E-Mail-Aliase zu verwenden, weise den MX-Eintrag deiner Domain auf die ZimaOS-IP und setze PRIVATE_EMAIL_DOMAINS auf deinen Domainnamen.

        **Ports 25 & 587** werden nur für das E-Mail-Aliasing benötigt. Falls nicht benötigt, können diese Ports ungenutzt bleiben.
  title:
    en_us: AliasVault
  index: /
  port_map: "1080"

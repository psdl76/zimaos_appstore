name: zigbee2mqtt
services:
  zigbee2mqtt:
    image: ghcr.io/koenkk/zigbee2mqtt:latest
    deploy:
      resources:
        reservations:
          memory: 256M
    network_mode: bridge
    ports:
      - target: 8080
        published: "8091"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/data
        target: /app/data
      - type: bind
        source: /run/udev
        target: /run/udev
        read_only: true
    environment:
      TZ: Europe/Berlin
      ZIGBEE2MQTT_CONFIG_MQTT_SERVER: "mqtt://192.168.1.x:1883"
      ZIGBEE2MQTT_CONFIG_SERIAL_PORT: "tcp://192.168.1.x:6638"
      ZIGBEE2MQTT_CONFIG_SERIAL_ADAPTER: "zstack"
      ZIGBEE2MQTT_CONFIG_HOMEASSISTANT_ENABLED: "true"
      ZIGBEE2MQTT_CONFIG_FRONTEND_ENABLED: "true"
      ZIGBEE2MQTT_CONFIG_FRONTEND_PORT: "8080"
    x-casaos:
      envs:
        - container: TZ
          description:
            en_us: "Timezone — e.g. Europe/Berlin, America/New_York"
            de_de: "Zeitzone — z.B. Europe/Berlin, America/New_York"
        - container: ZIGBEE2MQTT_CONFIG_MQTT_SERVER
          description:
            en_us: "MQTT broker address — e.g. mqtt://192.168.1.100:1883 (your Mosquitto host)"
            de_de: "MQTT-Broker-Adresse — z.B. mqtt://192.168.1.100:1883 (dein Mosquitto-Host)"
        - container: ZIGBEE2MQTT_CONFIG_SERIAL_PORT
          description:
            en_us: "Zigbee adapter address — TCP: tcp://192.168.1.x:6638 | USB: /dev/ttyUSB0"
            de_de: "Zigbee-Adapter-Adresse — TCP: tcp://192.168.1.x:6638 | USB: /dev/ttyUSB0"
        - container: ZIGBEE2MQTT_CONFIG_SERIAL_ADAPTER
          description:
            en_us: "Adapter type: zstack (TI CC2652, SMLIGHT), ember (Silicon Labs EFR32), deconz (ConBee)"
            de_de: "Adapter-Typ: zstack (TI CC2652, SMLIGHT), ember (Silicon Labs EFR32), deconz (ConBee)"
        - container: ZIGBEE2MQTT_CONFIG_HOMEASSISTANT_ENABLED
          description:
            en_us: "Enable Home Assistant MQTT Discovery (true/false)"
            de_de: "Home Assistant MQTT Discovery aktivieren (true/false)"
      ports:
        - container: "8080"
          description:
            en_us: Zigbee2MQTT web frontend — device management, pairing, logs
            de_de: Zigbee2MQTT Web-Frontend — Geräteverwaltung, Kopplung, Logs
      volumes:
        - container: /app/data
          description:
            en_us: Zigbee2MQTT data directory — configuration, device database, coordinator backup
            de_de: Datenverzeichnis — Konfiguration, Gerätedatenbank, Koordinator-Backup
    container_name: zigbee2mqtt
x-casaos:
  architectures:
    - amd64
    - arm64
    - arm
  main: zigbee2mqtt
  author: CasaOS Team
  category: Smart Home
  description:
    en_us: |
      Zigbee2MQTT bridges your Zigbee devices to Home Assistant (and any other system) via MQTT — without any proprietary hub or cloud connection. It supports over 3000 Zigbee devices from hundreds of manufacturers.

      All communication stays local: your sensors, switches, lights, and thermostats talk directly to your ZimaOS server. Zigbee2MQTT exposes every device as standard MQTT topics, which Home Assistant picks up automatically via MQTT Discovery.

      Key Features:
      - 3000+ supported Zigbee devices: IKEA, Philips Hue, Aqara, Sonoff, Tuya, and many more
      - Works with USB dongles (CC2652, ConBee II, SkyConnect) and network coordinators (SMLIGHT SLZB series)
      - Web frontend — pair devices, view status, manage groups and scenes
      - Home Assistant MQTT Discovery — devices appear in HA automatically
      - OTA firmware updates for supported Zigbee devices
      - Touchlink factory reset, groups, scenes, and binding
      - No cloud — fully local, works offline
    de_de: |
      Zigbee2MQTT verbindet deine Zigbee-Geräte mit Home Assistant (und anderen Systemen) über MQTT — ohne proprietären Hub oder Cloud-Verbindung. Es unterstützt über 3000 Zigbee-Geräte von hunderten Herstellern.

      Die gesamte Kommunikation bleibt lokal: Sensoren, Schalter, Lampen und Thermostate kommunizieren direkt mit dem ZimaOS-Server. Zigbee2MQTT stellt jedes Gerät als Standard-MQTT-Topics bereit, die Home Assistant automatisch über MQTT Discovery erkennt.

      Hauptfunktionen:
      - 3000+ unterstützte Zigbee-Geräte: IKEA, Philips Hue, Aqara, Sonoff, Tuya und viele mehr
      - Funktioniert mit USB-Dongles (CC2652, ConBee II, SkyConnect) und Netzwerk-Koordinatoren (SMLIGHT SLZB-Serie)
      - Web-Frontend — Geräte koppeln, Status anzeigen, Gruppen und Szenen verwalten
      - Home Assistant MQTT Discovery — Geräte erscheinen automatisch in HA
      - OTA-Firmware-Updates für unterstützte Zigbee-Geräte
      - Kein Cloud — vollständig lokal, funktioniert offline
    fr_fr: |
      Zigbee2MQTT connecte vos appareils Zigbee à Home Assistant via MQTT, sans hub propriétaire ni cloud. Plus de 3000 appareils supportés.
    zh_cn: |
      Zigbee2MQTT 通过 MQTT 将 Zigbee 设备连接到 Home Assistant，无需专有网关或云服务，支持 3000+ 设备。

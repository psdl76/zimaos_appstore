  tips:
    before_install:
      en_us: |
        ## Before you start

        Zigbee2MQTT requires a running **MQTT broker** (Mosquitto) and a **Zigbee coordinator** (USB dongle or network adapter). Install Mosquitto first if you haven't already.

        ---

        ## Step 1 — Set your environment variables

        Before installing, fill in two environment variables in the app settings:

        **`ZIGBEE2MQTT_CONFIG_MQTT_SERVER`** — your Mosquitto address:
        ```
        mqtt://192.168.1.100:1883
        ```
        Replace `192.168.1.100` with your ZimaOS IP address.

        **`ZIGBEE2MQTT_CONFIG_SERIAL_PORT`** — your Zigbee coordinator:

        - **SMLIGHT SLZB-MR1 / SLZB-06 (network):**
          ```
          tcp://192.168.1.x:6638
          ```
          Replace `192.168.1.x` with your SLZB device's IP (find it in your router or the SMLIGHT admin UI).
          Port `6638` is the default serial-over-TCP port for all SMLIGHT devices.

        - **USB dongle (CC2652, SkyConnect, etc.):**
          ```
          /dev/ttyUSB0
          ```
          or `/dev/ttyACM0` — check with `ls /dev/ttyUSB* /dev/ttyACM*` on ZimaOS.
          Also add a `devices:` section to the compose after installation.

        **`ZIGBEE2MQTT_CONFIG_SERIAL_ADAPTER`** — adapter type:

        | Adapter | Type |
        |---|---|
        | SMLIGHT SLZB-MR1, SLZB-06 | `zstack` |
        | Home Assistant SkyConnect | `ember` |
        | Sonoff Zigbee 3.0 USB Plus | `zstack` |
        | ConBee II / RaspBee II | `deconz` |
        | Silicon Labs EFR32 series | `ember` |

        ---

        ## Step 2 — First start

        Zigbee2MQTT will start and connect to your coordinator and MQTT broker. Open the web frontend at:

        **http://[ZimaOS-IP]:8091**

        If the connection succeeds, you'll see the dashboard. If not, check the container logs for error messages.

        ---

        ## Step 3 — Connect Home Assistant

        Home Assistant MQTT Discovery is enabled by default (`ZIGBEE2MQTT_CONFIG_HOMEASSISTANT_ENABLED=true`).

        Once Zigbee2MQTT is running and connected to Mosquitto, go to Home Assistant:
        **Settings → Devices & Services → MQTT**

        Zigbee2MQTT will appear automatically. All your Zigbee devices will show up in HA as soon as they are paired.

        ---

        ## Step 4 — Pair Zigbee devices

        In the Zigbee2MQTT frontend (**http://[ZimaOS-IP]:8091**):

        1. Click **"Permit join (All)"** — this opens a 254-second pairing window
        2. Put your Zigbee device into pairing mode (usually: hold the button until the LED flashes)
        3. The device appears in the list within a few seconds
        4. Rename it for easy identification (e.g. "Living Room Motion Sensor")

        The device will immediately appear in Home Assistant via MQTT Discovery.

        ---

        ## USB adapter — additional setup

        If you use a USB Zigbee dongle, edit the compose file after installation and add:

        ```yaml
        devices:
          - /dev/ttyUSB0:/dev/ttyUSB0
        ```
        Adjust the path to match your actual device. Then restart the container.

      de_de: |
        ## Bevor du anfängst

        Zigbee2MQTT benötigt einen laufenden **MQTT-Broker** (Mosquitto) und einen **Zigbee-Koordinator** (USB-Dongle oder Netzwerk-Adapter). Zuerst Mosquitto installieren, falls noch nicht geschehen.

        ---

        ## Schritt 1 — Umgebungsvariablen setzen

        Vor der Installation zwei Umgebungsvariablen in den App-Einstellungen ausfüllen:

        **`ZIGBEE2MQTT_CONFIG_MQTT_SERVER`** — Mosquitto-Adresse:
        ```
        mqtt://192.168.1.100:1883
        ```
        `192.168.1.100` durch die ZimaOS-IP-Adresse ersetzen.

        **`ZIGBEE2MQTT_CONFIG_SERIAL_PORT`** — Zigbee-Koordinator:

        - **SMLIGHT SLZB-MR1 / SLZB-06 (Netzwerk):**
          ```
          tcp://192.168.1.x:6638
          ```
          `192.168.1.x` durch die IP des SLZB-Geräts ersetzen (im Router oder SMLIGHT-Admin-UI zu finden).
          Port `6638` ist der Standard-Serial-über-TCP-Port aller SMLIGHT-Geräte.

        - **USB-Dongle (CC2652, SkyConnect usw.):**
          ```
          /dev/ttyUSB0
          ```
          oder `/dev/ttyACM0` — mit `ls /dev/ttyUSB* /dev/ttyACM*` auf ZimaOS prüfen.
          Nach der Installation auch einen `devices:`-Eintrag in der Compose-Datei hinzufügen.

        **`ZIGBEE2MQTT_CONFIG_SERIAL_ADAPTER`** — Adapter-Typ:

        | Adapter | Typ |
        |---|---|
        | SMLIGHT SLZB-MR1, SLZB-06 | `zstack` |
        | Home Assistant SkyConnect | `ember` |
        | Sonoff Zigbee 3.0 USB Plus | `zstack` |
        | ConBee II / RaspBee II | `deconz` |
        | Silicon Labs EFR32-Serie | `ember` |

        ---

        ## Schritt 2 — Erster Start

        Zigbee2MQTT startet und verbindet sich mit Koordinator und MQTT-Broker. Web-Frontend öffnen unter:

        **http://[ZimaOS-IP]:8091**

        Bei erfolgreicher Verbindung wird das Dashboard angezeigt. Bei Fehlern die Container-Logs prüfen.

        ---

        ## Schritt 3 — Home Assistant verbinden

        Home Assistant MQTT Discovery ist standardmäßig aktiviert (`ZIGBEE2MQTT_CONFIG_HOMEASSISTANT_ENABLED=true`).

        Sobald Zigbee2MQTT läuft und mit Mosquitto verbunden ist, in Home Assistant:
        **Einstellungen → Geräte & Dienste → MQTT**

        Zigbee2MQTT erscheint automatisch. Alle Zigbee-Geräte tauchen in HA auf, sobald sie gekoppelt sind.

        ---

        ## Schritt 4 — Zigbee-Geräte koppeln

        Im Zigbee2MQTT-Frontend (**http://[ZimaOS-IP]:8091**):

        1. **"Kopplung erlauben (Alle)"** klicken — öffnet ein 254-Sekunden-Kopplungsfenster
        2. Zigbee-Gerät in den Kopplungsmodus versetzen (meist: Taste halten bis LED blinkt)
        3. Gerät erscheint innerhalb von Sekunden in der Liste
        4. Zur einfachen Identifikation umbenennen (z.B. "Wohnzimmer Bewegungsmelder")

        Das Gerät erscheint sofort in Home Assistant über MQTT Discovery.

        ---

        ## USB-Adapter — zusätzliche Einrichtung

        Bei USB-Zigbee-Dongle nach der Installation die Compose-Datei bearbeiten und hinzufügen:

        ```yaml
        devices:
          - /dev/ttyUSB0:/dev/ttyUSB0
        ```
        Pfad an das tatsächliche Gerät anpassen, dann Container neu starten.

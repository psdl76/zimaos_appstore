name: home-assistant
services:
  home-assistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    deploy:
      resources:
        reservations:
          memory: 512M
    network_mode: host
    privileged: true
    restart: unless-stopped
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/config
        target: /config
      - type: bind
        source: /etc/localtime
        target: /etc/localtime
        read_only: true
      - type: bind
        source: /run/dbus
        target: /run/dbus
        read_only: true
    environment:
      TZ: Europe/Berlin
    x-casaos:
      envs:
        - container: TZ
          description:
            en_us: "Timezone — e.g. Europe/Berlin, America/New_York, Asia/Tokyo"
            de_de: "Zeitzone — z.B. Europe/Berlin, America/New_York, Asia/Tokyo"
      volumes:
        - container: /config
          description:
            en_us: Home Assistant configuration directory — automations, integrations, and settings
            de_de: Konfigurationsverzeichnis — Automatisierungen, Integrationen und Einstellungen
        - container: /run/dbus
          description:
            en_us: D-Bus socket — required for Bluetooth integration
            de_de: D-Bus-Socket — erforderlich für Bluetooth-Integration
    container_name: home-assistant
x-casaos:
  architectures:
    - amd64
    - arm64
    - arm
  main: home-assistant
  author: CasaOS Team
  category: Smart Home
  description:
    en_us: |
      Home Assistant is the leading open-source home automation platform. It integrates with thousands of devices and services — smart lights, thermostats, sensors, cameras, media players, and more — giving you complete local control without depending on any cloud.

      This deploys Home Assistant Container, the official Docker-based installation. It runs the full Home Assistant core with all integrations, automations, and the dashboard. Note: Add-ons (like the built-in Mosquitto or ESPHome) require Home Assistant OS — for those, run separate containers alongside this one.

      Key Features:
      - Local control — works fully offline, no cloud account required
      - 3000+ integrations: Philips Hue, IKEA Tradfri, Apple HomeKit, Z-Wave, Zigbee, MQTT, and hundreds more
      - Powerful automation engine with triggers, conditions, and actions
      - Energy monitoring dashboard
      - Mobile apps for iOS and Android with remote access
      - Voice assistant integration (Assist, Google Assistant, Amazon Alexa)
      - Dashboards customizable with Lovelace cards
    de_de: |
      Home Assistant ist die führende Open-Source-Plattform für Heimautomatisierung. Es integriert tausende Geräte und Dienste — smarte Lampen, Thermostate, Sensoren, Kameras, Mediaplayer und mehr — mit vollständiger lokaler Kontrolle ohne Cloud-Abhängigkeit.

      Diese Installation nutzt Home Assistant Container (offizielle Docker-Bereitstellung). Sie enthält den vollständigen Home Assistant Core mit allen Integrationen, Automatisierungen und dem Dashboard. Hinweis: Add-ons (wie der integrierte Mosquitto-Broker oder ESPHome) erfordern Home Assistant OS — dafür separate Container neben dieser Installation betreiben.

      Hauptfunktionen:
      - Lokale Steuerung — funktioniert vollständig offline, keine Cloud erforderlich
      - 3000+ Integrationen: Philips Hue, IKEA Tradfri, Apple HomeKit, Z-Wave, Zigbee, MQTT und viele mehr
      - Leistungsstarke Automatisierungsengine mit Triggern, Bedingungen und Aktionen
      - Energie-Monitoring-Dashboard
      - Mobile Apps für iOS und Android mit Fernzugriff
      - Sprachassistenten-Integration (Assist, Google Assistant, Amazon Alexa)
      - Anpassbare Dashboards mit Lovelace-Karten
    fr_fr: |
      Home Assistant est la principale plateforme domotique open-source. Elle s'intègre avec des milliers d'appareils et services pour un contrôle local complet sans dépendance au cloud.
    zh_cn: |
      Home Assistant 是领先的开源智能家居平台，支持数千种设备和服务集成，实现完全本地控制，无需依赖云服务。
    ru_ru: |
      Home Assistant — ведущая платформа домашней автоматизации с открытым исходным кодом. Интегрируется с тысячами устройств и сервисов с полным локальным управлением без облака.

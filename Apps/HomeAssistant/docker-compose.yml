  tips:
    before_install:
      en_us: |
        ## Why host network mode?

        Home Assistant runs with `network_mode: host` — it binds directly to the host network. This is required for:
        - **mDNS / Bonjour** — discovering Chromecast, Sonos, Apple TV, and other local devices automatically
        - **DHCP listener** — device tracking by IP address
        - **Bluetooth** — BLE sensors and devices

        Home Assistant is directly accessible at **http://[ZimaOS-IP]:8123** — no port remapping needed.

        ---

        ## Timezone

        Set the `TZ` environment variable to your local timezone before installing.
        Examples: `Europe/Berlin`, `America/New_York`, `America/Los_Angeles`, `Asia/Tokyo`

        Full list: [tz database time zones](https://en.wikipedia.org/wiki/List_of_tz_database_time_zones)

        ---

        ## First start

        Home Assistant takes **1–3 minutes** to initialize on first launch. Once ready, open:

        **http://[ZimaOS-IP]:8123**

        Create your owner account and follow the onboarding wizard — Home Assistant will automatically discover many devices on your local network.

        ---

        ## USB devices — Zigbee / Z-Wave dongles

        If you use a Zigbee or Z-Wave USB stick (e.g. Home Assistant SkyConnect, ConBee II, Nortek HUSBZB-1), you need to pass the device into the container.

        After installation, edit the compose file and add under `home-assistant`:

        ```yaml
        devices:
          - /dev/ttyUSB0:/dev/ttyUSB0
        ```

        Find the correct device path on your ZimaOS host:
        ```bash
        ls /dev/ttyUSB* /dev/ttyACM*
        ```

        Then restart the container.

        ---

        ## Note: No Add-ons

        This is **Home Assistant Container** — the Docker deployment. It includes all integrations and automations, but does **not** support Add-ons (like the built-in Mosquitto MQTT broker, Node-RED, or ESPHome). Those require Home Assistant OS.

        **Workarounds for common add-ons:**
        - **MQTT broker** → install the separate Mosquitto app from this store
        - **Node-RED** → install the separate Node-RED app
        - **ESPHome** → install the separate ESPHome app

        ---

        ## Image tag: `stable`

        Home Assistant uses the `stable` tag instead of `latest` — this is their recommended rolling-release tag, equivalent to "latest stable". It updates automatically when a new stable release is published.

      de_de: |
        ## Warum Host-Netzwerkmodus?

        Home Assistant läuft mit `network_mode: host` — es bindet direkt ans Host-Netzwerk. Das ist erforderlich für:
        - **mDNS / Bonjour** — automatische Erkennung von Chromecast, Sonos, Apple TV und anderen lokalen Geräten
        - **DHCP-Listener** — Geräte-Tracking per IP-Adresse
        - **Bluetooth** — BLE-Sensoren und Geräte

        Home Assistant ist direkt erreichbar unter **http://[ZimaOS-IP]:8123** — kein Port-Remapping nötig.

        ---

        ## Zeitzone

        Die `TZ`-Umgebungsvariable vor der Installation setzen.
        Beispiele: `Europe/Berlin`, `America/New_York`, `Asia/Tokyo`

        Vollständige Liste: [tz-Datenbank-Zeitzonen](https://en.wikipedia.org/wiki/List_of_tz_database_time_zones)

        ---

        ## Erster Start

        Home Assistant benötigt beim ersten Start **1–3 Minuten** zur Initialisierung. Danach öffnen:

        **http://[ZimaOS-IP]:8123**

        Konto erstellen und dem Einrichtungsassistenten folgen — Home Assistant erkennt viele Geräte im Netzwerk automatisch.

        ---

        ## USB-Geräte — Zigbee / Z-Wave Dongles

        Bei Verwendung eines Zigbee- oder Z-Wave-USB-Sticks (z.B. Home Assistant SkyConnect, ConBee II) muss das Gerät dem Container übergeben werden.

        Nach der Installation die Compose-Datei bearbeiten und unter `home-assistant` einfügen:

        ```yaml
        devices:
          - /dev/ttyUSB0:/dev/ttyUSB0
        ```

        Gerätepfad auf dem ZimaOS-Host finden:
        ```bash
        ls /dev/ttyUSB* /dev/ttyACM*
        ```

        Danach den Container neu starten.

        ---

        ## Hinweis: Keine Add-ons

        Dies ist **Home Assistant Container** — die Docker-Bereitstellung. Sie enthält alle Integrationen und Automatisierungen, unterstützt aber **keine Add-ons** (wie Mosquitto, Node-RED oder ESPHome). Diese erfordern Home Assistant OS.

        **Alternativen für häufige Add-ons:**
        - **MQTT-Broker** → separaten Mosquitto-Container installieren
        - **Node-RED** → separaten Node-RED-Container installieren
        - **ESPHome** → separaten ESPHome-Container installieren

        ---

        ## Image-Tag: `stable`

        Home Assistant verwendet den `stable`-Tag statt `latest` — das ist ihr empfohlener Rolling-Release-Tag, gleichbedeutend mit "neueste stabile Version". Er aktualisiert automatisch bei neuen Stable-Releases.
